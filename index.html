<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Draggable Example</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>

    <script src="draggable.js"></script>
    <p class="welcome-message">Welcome to the Draggable Tutorial</p>

    <div class="draggables-container">
        <div class="draggable-box center-content border-one" draggable="true" id="boxOne">
            drag me
        </div>
        <div class="draggable-box center-content border-two" draggable="true">
            drag me
        </div>
        <div class="draggable-box center-content border-three" draggable="true">
            drag me
        </div>
        <div class="draggable-box center-content border-four" draggable="true">
            drag me
        </div>
    </div>
    <div class="box-container" id="dropZone" >
        <div class="drag-box" ondrop="dropHandler(event)" ondragover="dragoverHandler(event)">
            <h1></h1>
        </div>

        <div class="drag-box" ondrop="dropHandler(event)" ondragover="dragoverHandler(event)">
            <h1></h1>
        </div>
    </div>

</body>
</html>
